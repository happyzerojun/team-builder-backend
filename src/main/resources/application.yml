server:
  port: 8080

spring:
  application:
    name: backend

  datasource:
    # н•ңкөӯ мӢңк°„ м„Өм •мқ„ мң„н•ҙ serverTimezoneмқ„ Asia/SeoulлЎң ліҖкІҪн•ҳлҠ” кІғмқ„ м¶”мІңн•©лӢҲлӢӨ.
    url: jdbc:mysql://localhost:3306/team_builder?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- м—¬кё°л¶Җн„°к°Җ м¶”к°Җ/мҲҳм •лҗң л¶Җл¶„мһ…лӢҲлӢӨ ---
  sql:
    init:
      mode: always # м„ңлІ„ мӢӨн–ү мӢңл§ҲлӢӨ src/main/resources/data.sqlмқ„ мӢӨн–үн•Ё

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # Hibernateк°Җ н…Ңмқҙлё”мқ„ лӢӨ л§Ңл“  "нӣ„м—җ" SQLмқҙ мӢӨн–үлҗҳлҸ„лЎқ мҲңм„ңлҘј мЎ°м Ҳн•©лӢҲлӢӨ.
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect # мӮ¬мҡ©н•  DB л°©м–ё лӘ…мӢң (к¶ҢмһҘ)